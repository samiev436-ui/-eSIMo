<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — HIKMAH HUB</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="app.js"></script>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="dark">

<header class="header">
    <div class="logo">HIKMAH HUB</div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="courses.html">Темы</a>
        <a href="about.html">О проекте</a>
        <a href="contact.html">Контакты</a>
        <a href="login.html" class="active">Вход</a>
        <a href="profile.html">Профиль</a>
    </nav>
</header>

<section class="hero small">
    <h1>Войти в аккаунт</h1>
    <p>Введите ваши учетные данные</p>
</section>

<div class="container">

    <div class="card" style="max-width:450px; margin:auto;">
        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Введите email" required>

            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="Введите пароль" required>

            <button type="submit">Войти</button>

            <p style="margin-top:15px; text-align:center;">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
        </form>
        <div id="loginMessage"></div>
    </div>

</div>

<footer class="footer">
    © 2026 HIKMAH HUB — Ислам по темам.
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const messageDiv = document.getElementById("loginMessage");
    messageDiv.innerHTML = "⏳ Проверка учетных данных...";

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const result = await loginUser(email, password);

    if (result.error) {
        messageDiv.innerHTML = `❌ Ошибка: ${result.error.message}`;
        console.error("❌ Ошибка входа:", result.error);
        return;
    }

    messageDiv.innerHTML = "✅ Успешный вход!";
    console.log("✅ Пользователь успешно вошел");
    setTimeout(() => {
        window.location.href = "profile.html";
    }, 1000);
});
</script>

</body>
</html>
